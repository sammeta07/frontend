<header>
  <h2>Join {{ data.title }}</h2>
  <button mat-icon-button type="button" (click)="onCancel()" aria-label="Close dialog">
    <mat-icon>close</mat-icon>
  </button>
</header>

<div class="dialog-body">
  <p class="join-instruction">Fill out the form below to request to join this group.</p>

  <!-- Join Form - To be implemented -->
  <div class="form-placeholder">
    <mat-icon>group_add</mat-icon>
    <span>Join form coming soon...</span>
  </div>
</div>

<footer>
  <button mat-button type="button" (click)="onCancel()">Cancel</button>
  <button mat-stroked-button type="button" (click)="onSubmit()">
    <mat-icon>how_to_reg</mat-icon> Submit Request
  </button>
</footer>
