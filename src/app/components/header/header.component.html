<mat-toolbar color="secondary" class="header-toolbar" role="banner">
  <div class="brand-section" role="img" aria-label="Samiti Logo">
    <mat-icon aria-hidden="true">groups</mat-icon>
    <h1 class="brand-name">SAMITI</h1>
  </div>
  <span class="spacer"></span>
  <div class="action-section">
    <button 
      mat-button 
      class="location-btn"
      [class.location-loading]="!userLocationName()"
      [disabled]="!userLocationName()"
      [matTooltip]="userLocationName() ? 'Your current location' : 'Detecting location...'"
      matTooltipPosition="below"
      aria-live="polite"
      [attr.aria-label]="userLocationName() ? 'Current location: ' + userLocationName() : 'Detecting your location'"
    >
      <mat-icon [class.pulse]="!userLocationName()">
        {{ userLocationName() ? 'my_location' : 'autorenew' }}
      </mat-icon>
      <span class="location-text">
        {{ userLocationName() || 'Locating...' }}
      </span>
    </button>
    
    <!-- Theme Selector Color Palette -->
    <div class="theme-palette-container">
      <button 
        mat-icon-button
        (click)="toggleThemePalette()"
        class="theme-selector-btn"
        [matTooltip]="'Current: ' + themeService.currentTheme().displayName"
        matTooltipPosition="below"
        aria-label="Open theme selector"
        [class.palette-open]="isPaletteOpen"
      >
        <mat-icon>format_color_fill</mat-icon>
      </button>
      
      <div class="theme-palette" *ngIf="isPaletteOpen">
        <button
          *ngFor="let theme of themeService.themes"
          (click)="selectTheme(theme.id); isPaletteOpen = false"
          class="theme-palette-cell"
          [style.background]="theme.id === 'dark-mode' ? theme.background : theme.primary"
          [class.selected]="themeService.currentTheme().id === theme.id"
          [class.dark-theme-cell]="theme.id === 'dark-mode'"
          [attr.aria-label]="'Select ' + theme.displayName + ' theme'"
          [attr.aria-pressed]="themeService.currentTheme().id === theme.id"
          [matTooltip]="theme.displayName"
          matTooltipPosition="above"
          type="button"
        >
          <mat-icon *ngIf="themeService.currentTheme().id === theme.id" class="theme-check-mark">check_circle</mat-icon>
        </button>
      </div>
    </div>

    <button 
      *ngIf="!isLoggedIn"
      mat-raised-button
      color="primary"
      (click)="onCreateSamiti()"
      class="create-btn"
      aria-label="Create new samiti"
    >
      <mat-icon aria-hidden="true">add</mat-icon>
      <span>CREATE</span>
    </button>
    
    <button 
      *ngIf="!isLoggedIn"
      mat-flat-button 
      color="primary"
      (click)="openLoginDialog()"
      class="login-btn"
      aria-label="Open login dialog"
    >
      <mat-icon aria-hidden="true">login</mat-icon>
      <span>LOGIN</span>
    </button>

    <button 
      *ngIf="isLoggedIn"
      mat-stroked-button
      color="warn"
      (click)="onLogout()"
      class="logout-btn"
      aria-label="Logout"
    >
      <mat-icon aria-hidden="true">logout</mat-icon>
      <span>LOGOUT</span>
    </button>
  </div>
</mat-toolbar>
